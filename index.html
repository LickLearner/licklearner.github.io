<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LickLearner</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Inter Variable", "Helvetica Neue", sans-serif;
    background: #F2EAD9;
    color: #1B1916;
    padding: 24px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1B1916; color: #F2EAD9; }
  }
  .card { max-width: 460px; text-align: center; }
  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-size: 42px;
    letter-spacing: -0.8px;
    margin: 0 0 12px;
  }
  p { font-size: 15px; line-height: 1.5; opacity: 0.8; margin: 0 0 20px; }
  .badge {
    display: inline-block;
    padding: 12px 24px;
    background: #2DA39F;
    color: white;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>LickLearner</h1>
  <p>A jazz practice app for iPhone and iPad. Pick a key, generate licks over ii–V–I changes, and play them back through your instrument.</p>
  <a class="badge" href="https://apps.apple.com/app/licklearner/id6744544706">View on the App Store</a>
</div>
</body>
</html>
